<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>English Grammar – üben</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="appbar">
    <div class="appbar__in">
      <a class="appbar__title" href="index.html"><span class="dot">G</span> English Grammar</a>
      <span style="opacity:.9;font-weight:700;font-size:.9rem" id="ready-count"></span>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Grammatik üben</h1>
      <p class="lead">Wähle ein Thema, lies die kurze Erklärung und übe spielerisch mit Sofort-Feedback.</p>
      <span class="stat" id="hero-stat"></span>
    </section>

    <div id="topic-list"></div>
  </main>

  <script src="js/topics.js"></script>
  <script>
    (function () {
      var groups = window.TOPIC_GROUPS, topics = window.TOPICS;
      var fertig = topics.filter(function (t) { return t.file; }).length;

      document.getElementById("ready-count").textContent = fertig + " / " + topics.length + " bereit";
      document.getElementById("hero-stat").textContent = fertig + " von " + topics.length + " Themen sind schon spielbar";

      function bestFor(t) {
        // Bestpunktzahl wird in quiz.js unter "best:<title>" gespeichert
        try { return parseInt(localStorage.getItem("best:" + t.title) || "0", 10); } catch (e) { return 0; }
      }

      var root = document.getElementById("topic-list");

      groups.forEach(function (g) {
        var items = topics.filter(function (t) { return t.group === g.key; });
        if (!items.length) return;
        var fertigG = items.filter(function (t) { return t.file; }).length;

        var sec = document.createElement("section");
        sec.className = "group";
        sec.innerHTML =
          '<div class="group__head"><h2>' + g.name + '</h2>' +
          '<span class="count">' + fertigG + " / " + items.length + ' bereit</span></div>' +
          '<div class="topics"></div>';
        var grid = sec.querySelector(".topics");

        items.forEach(function (t) {
          var best = t.file ? bestFor(t) : 0;
          if (t.file) {
            var a = document.createElement("a");
            a.className = "topic ready";
            a.href = "uebung.html?id=" + t.id;
            a.innerHTML =
              '<span class="n">' + t.id + '</span>' +
              '<span><span class="t">' + t.title + '</span>' +
              '<span class="meta">Spielbar · üben →</span></span>' +
              (best > 0 ? '<span class="best">' + best + ' P</span>' : '');
            grid.appendChild(a);
          } else {
            var d = document.createElement("div");
            d.className = "topic soon";
            d.innerHTML =
              '<span class="n">' + t.id + '</span>' +
              '<span><span class="t">' + t.title + '</span>' +
              '<span class="meta">in Arbeit</span></span>';
            grid.appendChild(d);
          }
        });

        root.appendChild(sec);
      });
    })();
  </script>
</body>
</html>
